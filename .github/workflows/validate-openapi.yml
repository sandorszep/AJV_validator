name: OpenAPI Style Validation

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AJV CLI
        run: npm install -g ajv-cli ajv-formats

      - name: Run AJV and Annotate
        run: |
          # Fájlok elérési útjai
          MAIN_SCHEMA="schemas/openapi-rules.json"
          METHODS_DIR="schemas/methods/*.json"
          SPEC_FILE="specifications/SpecificationV1.json"

          # 1. Validáció futtatása
          ajv validate \
            -s "$MAIN_SCHEMA" \
            -r "$METHODS_DIR" \
            -d "$SPEC_FILE" \
            --spec=draft7 --all-errors --errors=line --verbose > validation_output.txt 2>&1 || export VALIDATION_FAILED=true

          cat validation_output.txt

          # 2. Hibák feldolgozása a beépített jq-val
          ERROR_JSON=$(grep "^\[" validation_output.txt || echo "")

          if [ -n "$ERROR_JSON" ]; then
            echo "$ERROR_JSON" | jq -c '.[]' | while read -r error; do
              IPATH=$(echo "$error" | jq -r '.instancePath')
              MSG=$(echo "$error" | jq -r '.message')
              DATA=$(echo "$error" | jq -r '.data // "null"')
              
              DECODED_PATH=$(echo "$IPATH" | sed 's/~1/\//g' | sed 's/~0/~/g')
              PROP_NAME=$(echo "$DECODED_PATH" | awk -F/ '{print $NF}')
              
              LINE_NUM=$(grep -nE "\"$PROP_NAME\":\s*\"$DATA\"" "$SPEC_FILE" | head -n 1 | cut -d: -f1)
              if [ -z "$LINE_NUM" ]; then LINE_NUM=1; fi
              
              echo "::error file=$SPEC_FILE,line=$LINE_NUM,title=Stílus hiba::Mező: $DECODED_PATH | Hiba: $MSG | Érték: '$DATA'"
            done
          fi

          if [ "$VALIDATION_FAILED" = true ]; then
            echo "A validáció sikertelen volt."
            exit 1
          fi

      - name: Check URL Availability
        run: |
          SPEC_FILE="specifications/SpecificationV1.json"
          
          # Számlálók inicializálása
          TOTAL_CHECKED=0
          TOTAL_FAILED=0

          echo "🔍 Extracting and checking URLs from $SPEC_FILE..."
          
          # Az összes "url" kulcs értékének kinyerése a JSON-ből (csak a http/https kezdetűeket)
          URLS=$(jq -r '.. | .url? | select(type == "string") | select(test("^https?://"))' "$SPEC_FILE")

          for url in $URLS; do
            # Kihagyjuk azokat az URL-eket, amikben változó van (pl. https://{region}.sap.com)
            if echo "$url" | grep -q "{"; then
              echo "⚠️  Skipping parameterized URL: $url"
              continue
            fi

            # HTTP HEAD kérés küldése (30 mp timeout, csak státuszkód)
            HTTP_STATUS=$(curl -m 30 -o /dev/null -s -w "%{http_code}" -I -L "$url" || echo "FAILED")

            # Növeljük a vizsgált URL-ek számát
            TOTAL_CHECKED=$((TOTAL_CHECKED + 1))

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ OK ($HTTP_STATUS): $url"
            elif [[ "$HTTP_STATUS" =~ ^3 ]]; then
               echo "✅ OK (Redirect $HTTP_STATUS): $url"
            else
              echo "❌ ERROR: Dead link or inaccessible ($HTTP_STATUS): $url"
              # Növeljük a hibás URL-ek számát
              TOTAL_FAILED=$((TOTAL_FAILED + 1))
            fi
          done

          # Eredmények kiírása a logba
          echo ""
          echo "========================================"
          echo "📊 URL Ellenőrzés Eredménye:"
          echo "Megvizsgált URL: $TOTAL_CHECKED"
          echo "Hibás URL: $TOTAL_FAILED"
          echo "========================================"

          # Eredmények kiírása a GitHub Actions Summary képernyőre
          echo "### 📊 OpenAPI URL Ellenőrzés Eredménye" >> $GITHUB_STEP_SUMMARY
          echo "- **Megvizsgált URL-ek száma:** $TOTAL_CHECKED" >> $GITHUB_STEP_SUMMARY
          if [ "$TOTAL_FAILED" -gt 0 ]; then
            echo "- ❌ **Hibás URL-ek száma:** $TOTAL_FAILED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ✅ **Hibás URL-ek száma:** 0" >> $GITHUB_STEP_SUMMARY
          fi

          # Ha volt hibás URL, a CI/CD pipeline fail-eljen
          if [ "$TOTAL_FAILED" -gt 0 ]; then
            echo "🚨 A pipeline leállítva, mert $TOTAL_FAILED hibás URL található."
            exit 1
          fi
